<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Make Your Own Manga Adventure v1.3</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Dots&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <header id="siteHeader">
      <div class="header-left">
        <img id="headerPortrait" class="header-portrait" src="" alt="" hidden>
        <h1>Make Your Own Manga Adventure v1.3</h1>
      </div>
      <button class="menu-toggle" id="menuToggle">☰</button>
      <nav class="header-nav" id="headerNav">
        <a href="/story" target="_blank">Story Builder</a>
        <button id="navTestMode">Test Mode: OFF</button>
        <button id="navReloadStory" hidden>Reload Story</button>
        <select id="navJumpScene" hidden>
          <option value="">Jump to Scene…</option>
        </select>
        <button id="navStartOver" hidden>Start Over</button>
      </nav>
    </header>

    <!-- CHARACTER CREATION MODE -->
    <main id="creatorMode">
      <section class="controls">
        <h2>Build Your Character</h2>

        <div class="field">
          <label>Gender</label>
          <div class="chips" data-key="gender">
            <button class="chip active" data-value="male">Male</button>
            <button class="chip" data-value="female">Female</button>
            <button class="chip" data-value="neutral">Neutral</button>
          </div>
        </div>

        <div class="field">
          <label>Hair Style</label>
          <div class="chips" data-key="hairStyle">
            <button class="chip active" data-value="short wild spiky hair jutting out in all directions">Wild Spiky</button>
            <button class="chip" data-value="long straight hair falling past the shoulders">Long Straight</button>
            <button class="chip" data-value="high twin tails tied with ribbons">Twin Tails</button>
            <button class="chip" data-value="blunt bowl cut with straight-across fringe">Bowl Cut</button>
            <button class="chip" data-value="undercut with long swept-back top hair">Undercut Swept</button>
            <button class="chip" data-value="half-up bun with loose strands framing the face">Half-Up Bun</button>
            <button class="chip" data-value="long hair with a single thick braid over one shoulder">Side Braid</button>
            <button class="chip" data-value="short messy bedhead hair with a natural cowlick">Bedhead</button>
            <button class="chip" data-value="slicked-back hair with sharp widow's peak and no loose strands">Slicked Back</button>
            <button class="chip" data-value="voluminous wavy hair cascading down to the waist">Voluminous Waves</button>
            <button class="chip" data-value="large round afro, voluminous and perfectly spherical natural hair">Afro</button>
            <button class="chip" data-value="completely bald, smooth bare scalp, no hair whatsoever">Bald</button>
            <button class="chip" data-value="closely cropped buzz cut with sharp fade on the sides">Buzz Fade</button>
            <button class="chip" data-value="long hair with heavy straight-cut bangs covering the eyebrows">Hime Cut Bangs</button>
          </div>
        </div>

        <div class="field">
          <label>Hair Color</label>
          <div class="chips" data-key="hairColor">
            <button class="chip active" data-value="black">Black</button>
            <button class="chip" data-value="white">White</button>
            <button class="chip" data-value="gray">Something Else</button>
          </div>
        </div>

        <div class="field">
          <label>Personality</label>
          <div class="chips" data-key="personality">
            <button class="chip active" data-value="calm and stoic, cold unreadable eyes, jaw set, no wasted emotion">Stoic</button>
            <button class="chip" data-value="relentlessly cheerful, wide sparkling eyes, huge grin, eyebrows raised high">Cheerful</button>
            <button class="chip" data-value="mysterious and brooding, half-lidded eyes, slight smirk, deep shadows on face">Mysterious</button>
            <button class="chip" data-value="exhausted and done with everything, heavy-lidded eyes, flat expression, slight frown">Dead Inside</button>
            <button class="chip" data-value="cocky and smug, sharp grin, one eyebrow raised, arms crossed confidently">Smug</button>
            <button class="chip" data-value="cold calculating genius, sharp narrowed eyes, subtle condescending expression">Cold Genius</button>
            <button class="chip" data-value="tsundere, flushed cheeks, scowling with arms crossed but eyes betraying embarrassment">Tsundere</button>
            <button class="chip" data-value="hotheaded and explosive, veins popping on forehead, gritted teeth, fists clenched, leaning forward aggressively">Hotheaded</button>
            <button class="chip" data-value="complete idiot, enormous goofy grin, swirly confused eyes, drooling slightly, one eyebrow raised higher than the other">Idiot</button>
            <button class="chip" data-value="weathered and ancient, deep wrinkles, heavy-lidded wise eyes, slight knowing smile, hunched posture">Old</button>
            <button class="chip" data-value="unhinged and unpredictable, wide mismatched manic eyes, unsettling grin">Unhinged</button>
            <button class="chip" data-value="gentle and kind, soft warm eyes, slight smile, relaxed open posture">Gentle</button>
          </div>
        </div>

        <div class="field">
          <label>Outfit</label>
          <div class="chips" data-key="outfit">
            <button class="chip active" data-value="classic Japanese school uniform, white collared shirt, dark blazer, tie, dress pants">School Uniform</button>
            <button class="chip" data-value="full goth outfit, black leather jacket with studs, fishnet sleeves, heavy eyeliner, spiked choker, black combat boots, dark nail polish">Goth</button>
            <button class="chip" data-value="black Soul Reaper hakama robes, wide-leg pants, kimono top, tied with a white sash, barefoot">Soul Reaper</button>
            <button class="chip" data-value="tattered dark hooded cloak over layered wraps, worn leather straps, fingerless gloves">Dark Wanderer</button>
            <button class="chip" data-value="fitted military uniform, high collar, gold epaulettes, double-breasted jacket, polished boots">Military</button>
            <button class="chip" data-value="oversized streetwear hoodie, baggy cargo pants, chunky sneakers, chain accessories">Streetwear</button>
            <button class="chip" data-value="traditional Japanese shrine maiden outfit, white haori top, red hakama skirt, bare feet">Shrine Maiden</button>
            <button class="chip" data-value="wearing a ridiculous oversized inflatable T-Rex dinosaur costume, the kind from Halloween, puffy green body with tiny arms, character's face visible through the open mouth">T-Rex</button>
            <button class="chip" data-value="long formal coat over dress shirt and waistcoat, gloves, pocket watch chain">Victorian Coat</button>
            <button class="chip" data-value="torn and shredded school uniform exposing battle wounds, one sleeve missing, collar destroyed">Battle-Worn</button>
            <button class="chip" data-value="sleek all-black bodysuit with subtle armored panels at shoulders and forearms, no insignia">Stealth Ops</button>
            <button class="chip" data-value="loose linen yukata robe, open at the chest, sash loosely tied, wooden sandals">Casual Yukata</button>
            <button class="chip" data-value="flashy 70s disco outfit, wide-collar open shirt, tight bell-bottom pants, platform shoes, gold chain necklace">Disco</button>
            <button class="chip" data-value="soft flannel pajamas with a cartoon pattern, loose-fitting top and pants, fuzzy slippers">Pajamas</button>
            <button class="chip" data-value="a rough burlap potato sack worn as a dress, tied at the waist with rope, barefoot, holes at the arms">Potato Sack</button>
          </div>
        </div>



        <button class="generate-btn" id="generateBtn">Generate Character</button>
      </section>

      <section class="output">
        <div class="result-panel" id="resultPanel">
          <div class="placeholder">
            <div class="placeholder-icon">⛩️</div>
            <p>Your character will appear here</p>
          </div>
        </div>

        <div class="meta" id="meta" hidden>
          <button class="next-btn" id="adventureBtn">Begin Adventure</button>
        </div>
      </section>
    </main>

    <!-- ADVENTURE MODE -->
    <div id="adventureMode" class="adventure-mode" hidden>
      <div class="manga-strip" id="mangaStrip"></div>

      <div class="game-over-area" id="gameOverArea" hidden>
        <h3 class="game-over-text">GAME OVER</h3>
        <button class="restart-btn restart-btn-large" id="gameOverRestartBtn">Try Again</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
